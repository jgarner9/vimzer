<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HintMode</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 260px;
      background: #111;
      color: #ccc;
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 12px;
      padding: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .logo-icon {
      width: 20px;
      height: 20px;
      background: #daa520;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 800;
      color: #111;
    }

    .logo-name {
      font-weight: 700;
      font-size: 13px;
      color: #fff;
      letter-spacing: 1px;
    }

    .logo-version {
      font-size: 10px;
      color: #444;
      margin-left: auto;
    }

    .section {
      margin-bottom: 14px;
    }

    .section-title {
      color: #555;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .keybind-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid #1e1e1e;
    }

    .keybind-label {
      color: #999;
    }

    kbd {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 3px;
      padding: 2px 6px;
      font-family: inherit;
      font-size: 11px;
      color: #daa520;
    }

    .tip {
      background: #161616;
      border: 1px solid #222;
      border-left: 2px solid #daa520;
      border-radius: 3px;
      padding: 8px 10px;
      color: #666;
      font-size: 11px;
      line-height: 1.6;
      margin-top: 4px;
    }

    .tip strong {
      color: #daa520;
    }

    a {
      color: #555;
      font-size: 10px;
      text-decoration: none;
      display: block;
      text-align: center;
      margin-top: 12px;
    }

    a:hover { color: #888; }
  </style>
</head>
<body>
  <div class="logo">
    <div class="logo-icon">H</div>
    <span class="logo-name">HINTMODE</span>
    <span class="logo-version">v1.0</span>
  </div>

  <div class="section">
    <div class="section-title">Keybindings</div>
    <div class="keybind-row">
      <span class="keybind-label">Activate hints</span>
      <kbd>Alt + F</kbd>
    </div>
    <div class="keybind-row">
      <span class="keybind-label">Hints (new tab)</span>
      <kbd>Alt + Shift + F</kbd>
    </div>
    <div class="keybind-row">
      <span class="keybind-label">Cancel</span>
      <kbd>Esc</kbd>
    </div>
    <div class="keybind-row">
      <span class="keybind-label">Backspace</span>
      <kbd>⌫</kbd>
    </div>
  </div>

  <div class="tip">
    <strong>Tip:</strong> Change keybinds at<br>
    <code>chrome://extensions/shortcuts</code>
  </div>

  <a href="chrome://extensions/shortcuts" target="_blank">Customize shortcuts →</a>
</body>
</html>
